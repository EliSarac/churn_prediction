
step: test  # train or test

data:
  dataset_id: 349  # OULAD UCI repository ID  
  test_size: 0.2
  random_state: 42
  stratify: true

preprocessing:
  window_days: 28  # Week 4 prediction
  smote:
    enabled: true
    random_state: 42
  scaling:
    enabled: true
    method: standard  # standard or minmax
  
features:
  basic: true
  activity_types: false  # Set to true once feature engineering is complete

model:
  algorithm: logistic_regression
  hyperparameters:
    C: 0.001
    solver: lbfgs
    max_iter: 1000
    random_state: 42
  threshold: 0.40  

output:
  model_path: models/churn_model.pkl
  metrics_display: console  # console, file, or both
